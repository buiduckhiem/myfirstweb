<!DOCTYPE html>
<html>
<head>
    <title>Trang web của tôi</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; padding: 50px; }
        .card { background: #e3f2fd; padding: 30px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: inline-block; }
        h1 { color: #007bff; }
        button { background: #aebcea; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Chào thế giới! 🚀</h1>
        <p>Đây là trang web đầu tiên tôi đưa lên GitHub.</p>
        <button onclick="alert('Chúc mừng bạn đã click thành công!')">Bấm vào đây nè!</button>
    </div>
</body>
</html>
